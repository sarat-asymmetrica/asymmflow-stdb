<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Origami Nav | Wabi-Sabi UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap');

        :root {
            --color-paper-front: #f4f1ea;
            --color-paper-back: #e6e2d3;
            --color-ink: #1a1a1a;
            --color-accent: #b94047;
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'Zen Kaku Gothic New', sans-serif;
        }

        body {
            background-color: #2c2c2c;
            /* Dark background to make paper pop */
            color: var(--color-ink);
            font-family: var(--font-body);
            overflow: hidden;
            perspective: 1000px;
            /* Essential for 3D folds */
        }

        /* The Fold Container */
        .origami-menu {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 300px;
            z-index: 50;
            transform-style: preserve-3d;
            pointer-events: none;
            /* Allow clicks through when closed */
        }

        /* Individual Fold Segments */
        .fold-segment {
            position: absolute;
            width: 100%;
            height: 20%;
            /* 5 segments */
            left: 0;
            transform-origin: top center;
            transform-style: preserve-3d;
            background: var(--color-paper-front);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            padding: 0 2rem;
            opacity: 0;
            /* Start hidden */
            pointer-events: auto;
            cursor: pointer;
            transition: background 0.3s;
        }

        .fold-segment:hover {
            background: #fff;
        }

        .fold-segment:nth-child(1) {
            top: 0%;
            z-index: 5;
        }

        .fold-segment:nth-child(2) {
            top: 20%;
            z-index: 4;
        }

        .fold-segment:nth-child(3) {
            top: 40%;
            z-index: 3;
        }

        .fold-segment:nth-child(4) {
            top: 60%;
            z-index: 2;
        }

        .fold-segment:nth-child(5) {
            top: 80%;
            z-index: 1;
        }

        /* Fold Crease Shadow */
        .crease-shadow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.2), transparent 20%);
            pointer-events: none;
            opacity: 0;
        }

        /* Main Content Area */
        .main-content {
            margin-left: 100px;
            /* Space for collapsed menu */
            padding: 4rem;
            color: #f4f1ea;
            transition: transform 0.5s ease;
        }

        /* Toggle Button (Hamburger) */
        .menu-toggle {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 100;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--color-paper-front);
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .menu-toggle:hover {
            transform: scale(1.1);
        }

        .bar {
            width: 24px;
            height: 2px;
            background: var(--color-ink);
            transition: all 0.3s ease;
        }

        /* Active State for Toggle */
        .menu-toggle.active .bar:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }

        .menu-toggle.active .bar:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active .bar:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }
    </style>
</head>

<body>

    <!-- Toggle -->
    <button class="menu-toggle" onclick="toggleMenu()">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </button>

    <!-- Origami Menu -->
    <div class="origami-menu">
        <div class="fold-segment">
            <div class="crease-shadow"></div>
            <span class="text-2xl font-serif">01. Home</span>
        </div>
        <div class="fold-segment">
            <div class="crease-shadow"></div>
            <span class="text-2xl font-serif">02. Philosophy</span>
        </div>
        <div class="fold-segment">
            <div class="crease-shadow"></div>
            <span class="text-2xl font-serif">03. Works</span>
        </div>
        <div class="fold-segment">
            <div class="crease-shadow"></div>
            <span class="text-2xl font-serif">04. Journal</span>
        </div>
        <div class="fold-segment">
            <div class="crease-shadow"></div>
            <span class="text-2xl font-serif">05. Contact</span>
        </div>
    </div>

    <!-- Content -->
    <div class="main-content">
        <h1 class="text-6xl md:text-8xl font-serif mb-8 opacity-90">Origami Nav</h1>
        <p class="text-xl opacity-60 max-w-2xl leading-relaxed">
            A navigation system inspired by the art of paper folding.
            The menu doesn't just slide in; it unfolds, revealing its structure
            through geometry and shadow.
        </p>
        <div class="mt-12">
            <a href="index.html"
                class="text-paper-front opacity-50 hover:opacity-100 border-b border-paper-front/30 pb-1">← Back to
                Atelier</a>
        </div>
    </div>

    <script>
        let isOpen = false;
        const segments = document.querySelectorAll('.fold-segment');
        const toggle = document.querySelector('.menu-toggle');

        // Initial State: Folded away
        gsap.set(segments, {
            rotationX: -90,
            transformOrigin: "top center",
            opacity: 0,
            y: -20 // Slight overlap
        });

        function toggleMenu() {
            isOpen = !isOpen;
            toggle.classList.toggle('active');

            if (isOpen) {
                // UNFOLD SEQUENCE
                gsap.to(segments, {
                    duration: 0.8,
                    rotationX: 0,
                    opacity: 1,
                    y: 0,
                    stagger: 0.1, // Cascade effect
                    ease: "elastic.out(1, 0.75)",
                    overwrite: true
                });

                // Shadow effect
                gsap.to('.crease-shadow', {
                    opacity: 0, // Shadows disappear when flat
                    duration: 0.8,
                    delay: 0.2
                });

            } else {
                // FOLD SEQUENCE
                gsap.to(segments, {
                    duration: 0.5,
                    rotationX: -90,
                    opacity: 0,
                    y: -20,
                    stagger: {
                        amount: 0.3,
                        from: "end" // Fold from bottom up
                    },
                    ease: "power2.in",
                    overwrite: true
                });

                // Shadow effect
                gsap.to('.crease-shadow', {
                    opacity: 0.5, // Shadows deepen as it folds
                    duration: 0.3
                });
            }
        }

        // Hover effect for segments (3D tilt)
        segments.forEach(seg => {
            seg.addEventListener('mousemove', (e) => {
                if (!isOpen) return;
                const rect = seg.getBoundingClientRect();
                const y = e.clientY - rect.top;
                const tilt = (y / rect.height - 0.5) * 10; // +/- 5 deg

                gsap.to(seg, {
                    rotationX: tilt,
                    duration: 0.3,
                    ease: "power1.out"
                });
            });

            seg.addEventListener('mouseleave', () => {
                if (!isOpen) return;
                gsap.to(seg, {
                    rotationX: 0,
                    duration: 0.5,
                    ease: "elastic.out(1, 0.5)"
                });
            });
        });

    </script>
</body>

</html>
